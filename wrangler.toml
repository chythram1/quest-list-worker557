# KV binding: stores app preferences such as the selected theme and daily vibe.
[[kv_namespaces]]
binding = "TODO_KV"
id = "dc20aa76911b4a85afddc2163255e770"

# R2 binding: stores optional todo attachments uploaded as quest loot.
[[r2_buckets]]
binding = "TODO_BUCKET"
