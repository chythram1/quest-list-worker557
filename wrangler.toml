name = "quest-list-worker557"
main = "src/index.ts"
compatibility_date = "2025-05-25"

# D1 binding: stores quests, completion state, priorities, emojis, and attachment metadata.
[[d1_databases]]
binding = "TODO_DB"
database_name = "quest-list-worker-todo-db"
